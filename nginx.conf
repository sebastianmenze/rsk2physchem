# Nginx reverse-proxy snippet for nautilus.imr.no
#
# Place this inside your existing server { } block in
# /etc/nginx/sites-available/nautilus.imr.no (or equivalent).
#
# The container must be running on the same host, bound to 127.0.0.1:8050
# (change docker-compose.yml ports to "127.0.0.1:8050:8050" for safety).

location /rsk2physchem/ {
    proxy_pass         http://127.0.0.1:8050/rsk2physchem/;
    proxy_http_version 1.1;

    # Required for Dash's long-poll / WebSocket callbacks
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 300s;
}
